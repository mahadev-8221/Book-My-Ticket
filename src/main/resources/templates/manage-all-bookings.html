<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Bookings | BookMyTicket Admin</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--success: #22c55e;
	--danger: #ff4d6d;
	--warning: #facc15;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	color: var(--text-main);
	min-height: 100vh;
}

.navbar {
	background: #020617;
	border-bottom: 1px solid var(--border);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 900;
	font-size: 1.4rem;
	background: linear-gradient(135deg, var(--accent), #ff4081);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

.admin-container {
	max-width: 1200px;
	margin: 50px auto;
	padding: 0 20px;
}

.table-wrapper {
	background: #111827;
	border: 1px solid var(--border);
	border-radius: 18px;
	overflow: hidden;
	box-shadow: 0 35px 80px rgba(0, 0, 0, .7);
}

.table {
	margin: 0;
	color: var(--text-main);
}

.table thead th {
	background: #020617;
	color: var(--text-muted);
	font-size: .75rem;
	text-transform: uppercase;
	padding: 16px;
}

.table tbody td {
	padding: 16px;
	border-color: var(--border);
	font-size: .9rem;
}

.status-badge {
	padding: 4px 12px;
	border-radius: 20px;
	font-size: 0.75rem;
	font-weight: 700;
}

.status-pending { background: rgba(250, 204, 21, 0.15); color: var(--warning); }
.status-confirmed { background: rgba(34, 197, 94, 0.15); color: var(--success); }
.status-rejected { background: rgba(255, 77, 109, 0.15); color: var(--danger); }

.btn-approve { background: var(--success); color: #022c22; font-weight: 700; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; text-decoration: none; }
.btn-reject { background: var(--danger); color: white; font-weight: 700; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; text-decoration: none; }

</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">🎬 BookMyTicket Admin</a>
		</div>
	</nav>

	<div class="admin-container">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 class="fw-bold">🎟️ Manage All Bookings</h1>
			<a href="/" class="btn btn-outline-light">Back to Home</a>
		</div>

		<div class="table-wrapper">
			<table class="table">
				<thead>
					<tr>
						<th>User</th>
						<th>Movie</th>
						<th>Theater</th>
						<th>Seats</th>
						<th>Price</th>
						<th>Status</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="ticket : ${tickets}">
						<td th:text="${ticket.user.name}"></td>
						<td th:text="${ticket.movieName}"></td>
						<td th:text="${ticket.theaterName}"></td>
						<td th:text="${#strings.arrayJoin(ticket.seatNumber, ', ')}"></td>
						<td th:text="'₹' + ${ticket.ticketPrice * ticket.ticketCount}"></td>
						<td>
							<span th:class="'status-badge status-' + ${ticket.status != null ? ticket.status.toLowerCase() : 'pending'}" th:text="${ticket.status != null ? ticket.status : 'PENDING'}"></span>
						</td>
						<td>
							<div th:if="${ticket.status == null or ticket.status == 'PENDING'}">
								<a th:href="'/approve-booking/' + ${ticket.id}" class="btn-approve me-1">Approve</a>
								<a th:href="'/reject-booking/' + ${ticket.id}" class="btn-reject" onclick="return confirm('Reject this booking?')">Reject</a>
							</div>
							<span th:if="${ticket.status != null and ticket.status != 'PENDING'}" class="text-muted small">Processed</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

</body>
</html>
